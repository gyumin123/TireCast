<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TireCast — 타이어 촬영</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- SCR-MOB-001 : 모바일 타이어 촬영 화면 -->
<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<main class="mob-wrap">
    <div class="logo fade-up" style="margin-top: 8px;">
        <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="20" stroke="#38bdf8" stroke-width="5"/>
            <circle cx="24" cy="24" r="9" stroke="#f1f5f9" stroke-width="3" stroke-dasharray="4 4"/>
            <path d="M10 14 Q16 8 24 8" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Tire<em>Cast</em></span>
    </div>

    <!-- 촬영 / 업로드 카드 -->
    <section class="glass mob-card fade-up delay-1">
        <div class="upload-actions">
            <button type="button" class="btn btn-ghost" id="cameraBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                카메라로 촬영
            </button>
            <button type="button" class="btn btn-ghost" id="galleryBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                갤러리에서 선택
            </button>
        </div>
        <!-- 숨겨진 파일 입력: capture 속성으로 모바일 카메라 직접 호출 -->
        <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
        <input type="file" id="galleryInput" accept="image/*" hidden>

        <div class="preview-box" id="previewBox">
            <img id="previewImg" alt="업로드된 타이어 이미지 미리보기">
            <div class="preview-placeholder">
                <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="4" stroke-dasharray="3 3"/>
                </svg>
                <span>타이어 트레드가 잘 보이도록<br>정면에서 촬영해주세요</span>
            </div>
        </div>

        <!-- GPS 수집 상태 -->
        <div class="gps-chip" id="gpsChip">
            <span class="gps-dot"></span>
            <span id="gpsText">위치 정보 수집 대기 중...</span>
        </div>

        <button type="button" class="btn btn-primary btn-analyze" id="analyzeBtn" disabled>
            🔍 AI 안전 진단 시작
        </button>
    </section>
</main>

<!-- 분석 중 로딩 오버레이 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-tire"></div>
    <div class="loading-title">AI가 타이어를 분석하고 있어요</div>
    <div class="loading-sub" id="loadingSub">이미지에서 결함을 탐지하는 중...</div>
</div>

<script>
    const cameraInput = document.getElementById('cameraInput');
    const galleryInput = document.getElementById('galleryInput');
    const previewBox = document.getElementById('previewBox');
    const previewImg = document.getElementById('previewImg');
    const gpsChip = document.getElementById('gpsChip');
    const gpsText = document.getElementById('gpsText');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingSub = document.getElementById('loadingSub');

    let selectedFile = null;
    let coords = null;

    document.getElementById('cameraBtn').addEventListener('click', () => cameraInput.click());
    document.getElementById('galleryBtn').addEventListener('click', () => galleryInput.click());

    function handleFile(file) {
        if (!file) return;
        selectedFile = file;
        previewImg.src = URL.createObjectURL(file);
        previewBox.classList.add('has-image');
        updateAnalyzeState();
    }
    cameraInput.addEventListener('change', e => handleFile(e.target.files[0]));
    galleryInput.addEventListener('change', e => handleFile(e.target.files[0]));

    function updateAnalyzeState() {
        analyzeBtn.disabled = !selectedFile;
    }

    // HTML5 Geolocation API — 진입 즉시 위치 권한 요청
    function requestLocation() {
        if (!navigator.geolocation) {
            gpsChip.classList.add('fail');
            gpsText.textContent = '이 브라우저는 위치 정보를 지원하지 않습니다.';
            return;
        }
        gpsText.textContent = '위치 권한 요청 중... 허용을 눌러주세요';
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                gpsChip.classList.remove('fail');
                gpsChip.classList.add('ok');
                gpsText.textContent = `위치 확인 완료 (${coords.lat.toFixed(4)}, ${coords.lon.toFixed(4)})`;
            },
            () => {
                gpsChip.classList.add('fail');
                gpsText.textContent = '위치 권한이 거부되었습니다. 날씨 연동 없이 진단만 진행됩니다.';
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
    requestLocation();

    // 진단 시작
    analyzeBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        loadingOverlay.classList.add('show');

        // 로딩 문구 순환 애니메이션
        const phrases = [
            '이미지에서 결함을 탐지하는 중...',
            '마모·크랙·부풀음 여부 분석 중...',
            '현재 위치의 기상 데이터 조회 중...',
            '안전 인사이트 도출 중...'
        ];
        let pi = 0;
        const phraseTimer = setInterval(() => {
            pi = (pi + 1) % phrases.length;
            loadingSub.textContent = phrases[pi];
        }, 1600);

        const formData = new FormData();
        formData.append('image', selectedFile);
        if (coords) {
            formData.append('latitude', coords.lat);
            formData.append('longitude', coords.lon);
        }

        try {
            // 연동 API: POST /api/diagnosis/analyze (Spring → Flask YOLO 추론)
            const res = await fetch('/api/diagnosis/analyze', { method: 'POST', body: formData });
            if (res.ok) {
                const result = await res.json();
                sessionStorage.setItem('lastDiagnosis', JSON.stringify(result));
            }
            // TODO: 백엔드 구현 전 데모 — 실패해도 대시보드로 이동
        } catch (err) {
            // TODO: 백엔드 구현 전 데모 — 네트워크 오류 무시
        }

        // 분석 연출 후 대시보드로 전환
        setTimeout(() => {
            clearInterval(phraseTimer);
            location.href = '/dashboard';
        }, 2500);
    });
</script>
</body>
</html>
