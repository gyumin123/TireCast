<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TireCast — 타이어 촬영</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- SCR-MOB-001 : 모바일 타이어 촬영 화면 -->
<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<main class="mob-wrap">
    <div class="logo fade-up" style="margin-top: 8px;">
        <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="20" stroke="#38bdf8" stroke-width="5"/>
            <circle cx="24" cy="24" r="9" stroke="#f1f5f9" stroke-width="3" stroke-dasharray="4 4"/>
            <path d="M10 14 Q16 8 24 8" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Tire<em>Cast</em></span>
    </div>

    <!-- 촬영 / 업로드 카드 -->
    <section class="glass mob-card fade-up delay-1">
        <div class="upload-actions">
            <button type="button" class="btn btn-ghost" id="cameraBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                카메라로 촬영
            </button>
            <button type="button" class="btn btn-ghost" id="galleryBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                갤러리에서 선택
            </button>
        </div>
        <!-- 숨겨진 파일 입력: capture 속성으로 모바일 카메라 직접 호출 -->
        <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
        <input type="file" id="galleryInput" accept="image/*" hidden>

        <div class="preview-box" id="previewBox">
            <img id="previewImg" alt="업로드된 타이어 이미지 미리보기">
            <div class="preview-placeholder">
                <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="4" stroke-dasharray="3 3"/>
                </svg>
                <span>타이어 트레드가 잘 보이도록<br>정면에서 촬영해주세요</span>
            </div>
        </div>

        <!-- GPS 수집 상태 -->
        <div class="gps-chip" id="gpsChip">
            <span class="gps-dot"></span>
            <span id="gpsText">위치 정보 수집 대기 중...</span>
        </div>

        <button type="button" class="btn btn-primary btn-analyze" id="analyzeBtn" disabled>
            🔍 AI 안전 진단 시작
        </button>
    </section>
</main>

<!-- 분석 중 로딩 오버레이 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-tire"></div>
    <div class="loading-title">AI가 타이어를 분석하고 있어요</div>
    <div class="loading-sub" id="loadingSub">이미지에서 결함을 탐지하는 중...</div>
</div>

<script>
    const cameraInput = document.getElementById('cameraInput');
    const galleryInput = document.getElementById('galleryInput');
    const previewBox = document.getElementById('previewBox');
    const previewImg = document.getElementById('previewImg');
    const gpsChip = document.getElementById('gpsChip');
    const gpsText = document.getElementById('gpsText');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingSub = document.getElementById('loadingSub');

    let selectedFile = null;
    let coords = null;

    document.getElementById('cameraBtn').addEventListener('click', () => cameraInput.click());
    document.getElementById('galleryBtn').addEventListener('click', () => galleryInput.click());

    // F-COL-01: 업로드 전 브라우저에서 이미지 리사이징 (긴 변 640px, Canvas API)
    const RESIZE_MAX = 640;
    function resizeImage(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                const scale = Math.min(1, RESIZE_MAX / Math.max(img.width, img.height));
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width * scale);
                canvas.height = Math.round(img.height * scale);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(
                    blob => blob ? resolve(blob) : reject(new Error('이미지 변환 실패')),
                    'image/jpeg', 0.9);
            };
            img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지를 읽을 수 없습니다')); };
            img.src = url;
        });
    }

    async function handleFile(file) {
        if (!file) return;
        try {
            selectedFile = await resizeImage(file);
        } catch (e) {
            alert('이미지를 처리할 수 없습니다. 다른 사진을 선택해주세요.');
            return;
        }
        previewImg.src = URL.createObjectURL(selectedFile);
        previewBox.classList.add('has-image');
        updateAnalyzeState();
    }
    cameraInput.addEventListener('change', e => handleFile(e.target.files[0]));
    galleryInput.addEventListener('change', e => handleFile(e.target.files[0]));

    function updateAnalyzeState() {
        analyzeBtn.disabled = !selectedFile;
    }

    // F-COL-02: HTML5 Geolocation API — 권한 거부 시 기본값(서울)으로 폴백
    const SEOUL = { lat: 37.5665, lon: 126.9780 };
    function useFallbackLocation(reason) {
        coords = { ...SEOUL, fallback: true };
        sessionStorage.setItem('lastCoords', JSON.stringify(coords));
        gpsChip.classList.add('fail');
        gpsText.textContent = reason + ' 기본 위치(서울) 기준으로 진단합니다.';
    }
    function requestLocation() {
        if (!navigator.geolocation) {
            useFallbackLocation('이 브라우저는 위치 정보를 지원하지 않습니다.');
            return;
        }
        gpsText.textContent = '위치 권한 요청 중... 허용을 눌러주세요';
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                sessionStorage.setItem('lastCoords', JSON.stringify(coords));
                gpsChip.classList.remove('fail');
                gpsChip.classList.add('ok');
                gpsText.textContent = `위치 확인 완료 (${coords.lat.toFixed(4)}, ${coords.lon.toFixed(4)})`;
            },
            () => useFallbackLocation('위치 권한이 거부되었습니다.'),
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
    requestLocation();

    // 진단 시작
    analyzeBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        loadingOverlay.classList.add('show');

        // 로딩 문구 순환 애니메이션
        const phrases = [
            '이미지에서 결함을 탐지하는 중...',
            '마모·크랙·부풀음 여부 분석 중...',
            '현재 위치의 기상 데이터 조회 중...',
            '안전 인사이트 도출 중...'
        ];
        let pi = 0;
        const phraseTimer = setInterval(() => {
            pi = (pi + 1) % phrases.length;
            loadingSub.textContent = phrases[pi];
        }, 1600);

        const formData = new FormData();
        formData.append('image', selectedFile, 'tire.jpg');
        if (coords) {
            formData.append('latitude', coords.lat);
            formData.append('longitude', coords.lon);
        }

        try {
            // F-ANA-01~03: POST /api/diagnosis/analyze (Spring → Flask YOLO → 날씨 융합)
            const res = await fetch('/api/diagnosis/analyze', { method: 'POST', body: formData });
            if (res.ok) {
                const result = await res.json();
                sessionStorage.setItem('lastDiagnosis', JSON.stringify(result));
                clearInterval(phraseTimer);
                location.href = '/dashboard';
                return;
            }
            if (res.status === 401) {
                clearInterval(phraseTimer);
                location.href = '/';
                return;
            }
            const body = await res.json().catch(() => ({}));
            throw new Error(body.message || '진단에 실패했습니다. 잠시 후 다시 시도해주세요.');
        } catch (err) {
            clearInterval(phraseTimer);
            loadingOverlay.classList.remove('show');
            alert(err.message || '서버에 연결할 수 없습니다.');
        }
    });
</script>
</body>
</html>
