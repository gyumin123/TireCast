<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TireCast — 안전 진단 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- SCR-DASH-001 : 웹 대시보드 (인사이트 결과) -->
<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<main class="dash-wrap">
    <header class="dash-header fade-up">
        <div class="logo">
            <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="20" stroke="#38bdf8" stroke-width="5"/>
                <circle cx="24" cy="24" r="9" stroke="#f1f5f9" stroke-width="3" stroke-dasharray="4 4"/>
                <path d="M10 14 Q16 8 24 8" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">Tire<em>Cast</em></span>
        </div>
        <a th:href="@{/mobile}" class="btn btn-primary" style="padding: 12px 22px; text-decoration: none;">
            📷 새로운 타이어 검사
        </a>
    </header>

    <!-- 안전 인사이트 패널 -->
    <section class="glass insight-panel fade-up delay-1" id="insightPanel">
        <div class="insight-head">
            <span class="insight-icon" id="insightIcon">⏳</span>
            <span class="insight-title" id="insightTitle">진단 결과를 불러오는 중...</span>
        </div>
        <p class="insight-guide" id="insightGuide">타이어 상태와 기상 데이터를 융합 분석하고 있습니다.</p>
        <div class="insight-detail" id="insightDetail"></div>
    </section>

    <div class="dash-grid">
        <!-- 진단 요약 카드 -->
        <section class="glass panel hoverable fade-up delay-2">
            <h2>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" stroke-dasharray="3 3"/>
                </svg>
                AI 진단 요약
            </h2>
            <div class="result-image-box" id="resultImageBox">
                <!-- YOLO 분석 결과 이미지 (바운딩 박스 표시) — API 연동 전 데모 렌더링 -->
                <svg class="tire-placeholder" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                    <rect width="400" height="300" fill="#16213a"/>
                    <circle cx="200" cy="150" r="115" fill="#0f172a" stroke="#334155" stroke-width="14"/>
                    <circle cx="200" cy="150" r="115" fill="none" stroke="#475569" stroke-width="4" stroke-dasharray="14 10"/>
                    <circle cx="200" cy="150" r="46" fill="#1e293b" stroke="#475569" stroke-width="5"/>
                    <circle cx="200" cy="150" r="14" fill="#334155"/>
                    <path d="M120 90 L150 118 M280 90 L250 118 M120 210 L150 182 M280 210 L250 182" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
                </svg>
                <div class="bbox" id="demoBbox" style="left: 22%; top: 18%; width: 26%; height: 24%;">
                    <span class="bbox-label" id="demoBboxLabel">crack 0.87</span>
                </div>
            </div>
            <div class="weather-row" id="weatherRow">
                <span class="weather-icon" id="weatherIcon">🌧️</span>
                <div class="weather-main">
                    <span class="weather-loc" id="weatherLoc">위치 확인 중...</span>
                    <span class="weather-desc" id="weatherDesc">기상 정보 조회 중</span>
                </div>
                <div class="weather-metrics" id="weatherMetrics"></div>
            </div>
        </section>

        <!-- 히스토리 영역 -->
        <section class="glass panel hoverable fade-up delay-3">
            <h2>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                진단 히스토리
            </h2>
            <div class="history-list" id="historyList">
                <div class="history-empty">진단 이력을 불러오는 중...</div>
            </div>
        </section>
    </div>
</main>

<!-- 진단 상세 모달: 히스토리 클릭 시 과거 검사 내역 표시 -->
<div class="modal-overlay" id="historyModal">
    <div class="glass modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-head">
            <div>
                <div class="modal-title" id="modalTitle">
                    <span id="modalIcon">✅</span>
                    <span id="modalStatusText">진단 상세</span>
                </div>
                <div class="modal-date" id="modalDate"></div>
            </div>
            <button type="button" class="modal-close" id="modalCloseBtn" aria-label="닫기">✕</button>
        </div>

        <div class="modal-section">
            <span class="section-label">분석 이미지</span>
            <div class="result-image-box" id="modalImageBox"></div>
        </div>

        <div class="modal-section">
            <span class="section-label">탐지된 결함</span>
            <div class="insight-detail" id="modalDefects"></div>
        </div>

        <div class="modal-section">
            <span class="section-label">당시 기상 정보</span>
            <div class="weather-row">
                <span class="weather-icon" id="modalWeatherIcon">☀️</span>
                <div class="weather-main">
                    <span class="weather-loc" id="modalWeatherLoc"></span>
                    <span class="weather-desc" id="modalWeatherDesc"></span>
                </div>
                <div class="weather-metrics" id="modalWeatherMetrics"></div>
            </div>
        </div>

        <div class="modal-section">
            <span class="section-label">안전 인사이트</span>
            <div class="modal-insight" id="modalGuide"></div>
        </div>
    </div>
</div>

<script>
    /* =========================================================
       데이터 로딩: API 연동 전에는 데모 데이터로 화면 구성 확인
       ========================================================= */
    const STATUS_META = {
        safe:   { icon: '✅', title: '안전 — 주행 가능',       cls: 'safe' },
        warn:   { icon: '⚠️', title: '경고 — 주의 운전 필요',   cls: 'warn' },
        danger: { icon: '🚨', title: '위험 — 운행 자제 권고',   cls: 'danger' }
    };

    // 데모 진단 결과 (POST /api/diagnosis/analyze 응답 형태 가정)
    const DEMO_DIAGNOSIS = {
        status: 'danger',
        guide: '트레드 마모가 심한 상태에서 현재 지역에 강한 비가 내리고 있습니다. 수막현상 위험이 매우 높으므로 오늘은 대중교통 이용을 권장합니다. 빠른 시일 내 타이어 교체가 필요합니다.',
        defects: [
            { label: '트레드 마모 (tr)', confidence: 0.87 },
            { label: '측면 크랙 (cut)', confidence: 0.64 }
        ],
        weather: {
            location: '대구광역시 달서구',
            description: '강한 비',
            icon: '🌧️',
            precipitation: 15.2,
            temperature: 24.5
        }
    };

    // 데모 진단 이력 (GET /api/diagnosis/history 응답 형태 가정 — detail은 GET /api/diagnosis/history/{id})
    const DEMO_HISTORY = [
        {
            id: 4, date: '2026-07-05', summary: '경고 — 측면 미세 크랙 1건', status: 'warn',
            detail: {
                defects: [{ label: '측면 크랙 (cut)', confidence: 0.58 }],
                bboxes: [{ left: 58, top: 40, width: 20, height: 18, label: 'cut 0.58' }],
                guide: '측면에 미세 크랙이 발견되었습니다. 당장 위험하지는 않지만 진행 상태를 주기적으로 확인하고, 고속 주행 전 점검을 권장합니다.',
                weather: { location: '대구광역시 달서구', description: '흐림', icon: '☁️', precipitation: 0.4, temperature: 27.1 }
            }
        },
        {
            id: 3, date: '2026-06-21', summary: '안전 — 결함 미탐지', status: 'safe',
            detail: {
                defects: [],
                bboxes: [],
                guide: '탐지된 결함이 없습니다. 타이어 상태가 양호하며 현재 기상 조건에서 안전하게 주행할 수 있습니다.',
                weather: { location: '대구광역시 달서구', description: '맑음', icon: '☀️', precipitation: 0, temperature: 29.3 }
            }
        },
        {
            id: 2, date: '2026-06-02', summary: '안전 — 결함 미탐지', status: 'safe',
            detail: {
                defects: [],
                bboxes: [],
                guide: '탐지된 결함이 없습니다. 트레드 상태가 양호합니다. 다음 정기 점검까지 안심하고 주행하세요.',
                weather: { location: '대구광역시 수성구', description: '구름 조금', icon: '🌤️', precipitation: 0, temperature: 24.8 }
            }
        },
        {
            id: 1, date: '2026-05-18', summary: '위험 — 비드 손상 탐지', status: 'danger',
            detail: {
                defects: [
                    { label: '비드 손상 (bead_damage)', confidence: 0.81 },
                    { label: '부풀음 (CBU)', confidence: 0.66 }
                ],
                bboxes: [
                    { left: 20, top: 55, width: 24, height: 22, label: 'bead_damage 0.81' },
                    { left: 60, top: 22, width: 18, height: 20, label: 'CBU 0.66' }
                ],
                guide: '비드 손상과 부풀음이 동시에 탐지되었습니다. 주행 중 파열 위험이 있어 즉시 정비소 방문이 필요했던 상태입니다.',
                weather: { location: '대구광역시 달서구', description: '맑음', icon: '☀️', precipitation: 0, temperature: 26.0 }
            }
        }
    ];

    function renderInsight(d) {
        const meta = STATUS_META[d.status] || STATUS_META.safe;
        const panel = document.getElementById('insightPanel');
        panel.classList.remove('safe', 'warn', 'danger');
        // 리플로우 후 클래스 적용 → 색상 전환 애니메이션 트리거
        requestAnimationFrame(() => panel.classList.add(meta.cls));

        document.getElementById('insightIcon').textContent = meta.icon;
        document.getElementById('insightTitle').textContent = meta.title;
        document.getElementById('insightGuide').textContent = d.guide;

        const detail = document.getElementById('insightDetail');
        detail.innerHTML = '';
        d.defects.forEach(def => {
            const badge = document.createElement('span');
            badge.className = 'badge badge-' + meta.cls;
            badge.textContent = `${def.label} · ${(def.confidence * 100).toFixed(0)}%`;
            detail.appendChild(badge);
        });
    }

    function renderWeather(w) {
        document.getElementById('weatherIcon').textContent = w.icon;
        document.getElementById('weatherLoc').textContent = w.location;
        document.getElementById('weatherDesc').textContent = w.description;
        document.getElementById('weatherMetrics').innerHTML =
            `강수량 ${w.precipitation}mm<br>기온 ${w.temperature}°C`;
    }

    function renderHistory(items) {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        if (!items.length) {
            list.innerHTML = '<div class="history-empty">아직 진단 이력이 없습니다.<br>첫 타이어 검사를 시작해보세요!</div>';
            return;
        }
        items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'history-item';
            el.innerHTML = `
                <span class="h-date">${item.date}</span>
                <span class="h-summary">${item.summary}</span>
                <span class="badge badge-${item.status}">${
                    item.status === 'safe' ? '안전' : item.status === 'warn' ? '경고' : '위험'
                }</span>`;
            el.addEventListener('click', () => openHistoryModal(item));
            list.appendChild(el);
        });
    }

    /* =========================================================
       진단 상세 모달
       ========================================================= */
    const modal = document.getElementById('historyModal');

    function tirePlaceholderSVG() {
        return `<svg class="tire-placeholder" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
            <rect width="400" height="300" fill="#16213a"/>
            <circle cx="200" cy="150" r="115" fill="#0f172a" stroke="#334155" stroke-width="14"/>
            <circle cx="200" cy="150" r="115" fill="none" stroke="#475569" stroke-width="4" stroke-dasharray="14 10"/>
            <circle cx="200" cy="150" r="46" fill="#1e293b" stroke="#475569" stroke-width="5"/>
            <circle cx="200" cy="150" r="14" fill="#334155"/>
            <path d="M120 90 L150 118 M280 90 L250 118 M120 210 L150 182 M280 210 L250 182" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
        </svg>`;
    }

    function renderModalContent(item, detail) {
        const meta = STATUS_META[item.status] || STATUS_META.safe;

        document.getElementById('modalIcon').textContent = meta.icon;
        document.getElementById('modalStatusText').textContent = meta.title;
        document.getElementById('modalDate').textContent = item.date + ' 검사';

        // 분석 이미지 + 바운딩 박스 (API 연동 후에는 detail.imageUrl 사용)
        const imageBox = document.getElementById('modalImageBox');
        imageBox.innerHTML = detail.imageUrl
            ? `<img src="${detail.imageUrl}" alt="분석된 타이어 이미지">`
            : tirePlaceholderSVG();
        (detail.bboxes || []).forEach(b => {
            const box = document.createElement('div');
            box.className = 'bbox';
            box.style.cssText = `left:${b.left}%; top:${b.top}%; width:${b.width}%; height:${b.height}%;`;
            box.innerHTML = `<span class="bbox-label">${b.label}</span>`;
            imageBox.appendChild(box);
        });

        // 탐지 결함 배지
        const defectsEl = document.getElementById('modalDefects');
        defectsEl.innerHTML = '';
        if (!detail.defects || !detail.defects.length) {
            defectsEl.innerHTML = '<span class="badge badge-safe">결함 미탐지</span>';
        } else {
            detail.defects.forEach(def => {
                const badge = document.createElement('span');
                badge.className = 'badge badge-' + meta.cls;
                badge.textContent = `${def.label} · ${(def.confidence * 100).toFixed(0)}%`;
                defectsEl.appendChild(badge);
            });
        }

        // 당시 기상 정보
        const w = detail.weather || {};
        document.getElementById('modalWeatherIcon').textContent = w.icon || '☀️';
        document.getElementById('modalWeatherLoc').textContent = w.location || '-';
        document.getElementById('modalWeatherDesc').textContent = w.description || '-';
        document.getElementById('modalWeatherMetrics').innerHTML =
            `강수량 ${w.precipitation ?? '-'}mm<br>기온 ${w.temperature ?? '-'}°C`;

        // 인사이트 가이드
        const guideEl = document.getElementById('modalGuide');
        guideEl.className = 'modal-insight ' + meta.cls;
        guideEl.textContent = detail.guide || '';
    }

    async function openHistoryModal(item) {
        let detail = item.detail;

        // 연동 API: GET /api/diagnosis/history/{id} (Spring → SQLite 상세 조회)
        if (item.id != null) {
            try {
                const res = await fetch(`/api/diagnosis/history/${item.id}`);
                if (res.ok) detail = await res.json();
            } catch (err) { /* 백엔드 미구현 — 데모 detail 사용 */ }
        }
        if (!detail) return;

        renderModalContent(item, detail);
        modal.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeHistoryModal() {
        modal.classList.remove('show');
        document.body.style.overflow = '';
    }

    document.getElementById('modalCloseBtn').addEventListener('click', closeHistoryModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeHistoryModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeHistoryModal(); });

    async function loadDashboard() {
        // 직전 진단 결과가 세션에 있으면 우선 사용
        let diagnosis = null;
        try { diagnosis = JSON.parse(sessionStorage.getItem('lastDiagnosis')); } catch (e) {}

        // 연동 API: GET /api/weather (Spring → Open-Meteo)
        // 연동 API: GET /api/diagnosis/history (Spring → SQLite)
        try {
            const [weatherRes, historyRes] = await Promise.all([
                fetch('/api/weather'),
                fetch('/api/diagnosis/history')
            ]);
            if (weatherRes.ok && historyRes.ok) {
                const weather = await weatherRes.json();
                const history = await historyRes.json();
                renderWeather(weather);
                renderHistory(history);
                renderInsight(diagnosis || DEMO_DIAGNOSIS);
                return;
            }
        } catch (err) { /* 백엔드 미구현 — 데모 데이터로 대체 */ }

        // TODO: 백엔드 구현 전 데모 렌더링 — API 준비 완료 후 제거
        setTimeout(() => {
            renderInsight(DEMO_DIAGNOSIS);
            renderWeather(DEMO_DIAGNOSIS.weather);
            renderHistory(DEMO_HISTORY);
        }, 600);
    }

    loadDashboard();
</script>
</body>
</html>
