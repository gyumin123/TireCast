spring.application.name=tirecast
server.port=8080

# 세션은 쿠키로만 추적 (URL에 ;jsessionid 노출 방지)
server.servlet.session.tracking-modes=cookie

# 개발 중 템플릿/정적 리소스 즉시 반영
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

# 이미지 업로드 허용 크기
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# SQLite (파일 기반 초경량 DB — ERD 명세 기준)
spring.datasource.url=jdbc:sqlite:tirecast.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# 업로드 이미지 저장 디렉토리 (DB에는 경로만 저장)
tirecast.upload-dir=uploads

# Flask AI 추론 서버 (내부망)
# 로컬 macOS는 AirPlay가 5000을 선점하므로 5001 사용 — GCP 배포 시 명세대로 5000으로 변경 가능
tirecast.flask-url=http://localhost:5001
